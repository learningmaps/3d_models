<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Board Design</title>
    <!-- Import the component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <!-- Import icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        header {
            padding: 8px 16px;
            background: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        model-viewer {
            flex-grow: 1;
            width: 100%;
            background-color: #f8f9fa;
            --poster-color: transparent;
            touch-action: none;
        }

        /* Technical Controls */
        .view-controls {
            position: absolute;
            top: 60px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 20;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ccc;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #333;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: all 0.2s;
        }

        .control-btn:active {
            transform: scale(0.9);
            background: #e0e0e0;
        }

        /* Specs Table Overlay */
        .specs-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 100;
            width: 85%;
            max-width: 320px;
            display: none;
        }

        .specs-overlay.visible {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .specs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .specs-table th, .specs-table td {
            text-align: left;
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .specs-table .category-header {
            background: #f8f9fa;
            color: #4285f4;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #4285f4;
            padding-top: 15px;
        }

        .specs-table th {
            color: #666;
            font-weight: 500;
            width: 40%;
        }

        .specs-table td {
            color: #2c3e50;
            font-weight: 700;
        }

        .close-specs {
            float: right;
            cursor: pointer;
            color: #999;
            font-size: 20px;
        }

        .bottom-bar {
            padding: 16px;
            background: #fff;
            display: flex;
            justify-content: center;
            gap: 16px;
            border-top: 1px solid #eee;
        }

        .toggle-btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
        }

        #ar-button {
            background: #fff;
            border: 1px solid #ccc;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
        }
    </style>
</head>
<body>

    <header>
        <h1>Balance Board Viewer</h1>
    </header>

    <model-viewer 
        id="viewer"
        src="balance_board.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        camera-target="0m 0.1m 0m"
        camera-orbit="0deg 75deg 2m"
        disable-pan
        shadow-intensity="1" 
        auto-rotate 
        exposure="1">
        
        <div class="view-controls">
            <button class="control-btn" onclick="setView('top')" title="Top View">
                <i class="fas fa-arrows-left-right" style="transform: rotate(90deg);"></i>
            </button>
            <button class="control-btn" onclick="setView('side')" title="Side View">
                <i class="fas fa-arrows-left-right"></i>
            </button>
            <button class="control-btn" onclick="setView('front')" title="Front View">
                <i class="fas fa-square"></i>
            </button>
        </div>

        <div class="specs-overlay" id="specs-modal">
            <i class="fas fa-times close-specs" onclick="toggleSpecs()"></i>
            <h2 style="margin: 0 0 5px 0; font-size: 18px; color: #2c3e50;">Design Specs</h2>
            <table class="specs-table">
                <tr><th colspan="2" class="category-header">Deck (Birch Plywood)</th></tr>
                <tr><th>Length</th><td>82 cm</td></tr>
                <tr><th>Width</th><td>38 cm</td></tr>
                <tr><th>Thickness</th><td>1.9 cm</td></tr>
                <tr><th colspan="2" class="category-header">Roller (PVC)</th></tr>
                <tr><th>Diameter</th><td>11 cm</td></tr>
                <tr><th>Length</th><td>42 cm</td></tr>
            </table>
        </div>

        <button slot="ar-button" id="ar-button">
            <i class="fas fa-vr-cardboard" style="color: #4285f4; font-size: 18px;"></i>
            View in AR
        </button>

    </model-viewer>

    <div class="bottom-bar">
        <button class="toggle-btn" id="specs-btn" onclick="toggleSpecs()">
            <i class="fas fa-list-ul"></i> &nbsp;DESIGN SPECS
        </button>
    </div>

    <script>
        const viewer = document.querySelector('#viewer');
        const specsModal = document.querySelector('#specs-modal');

        function toggleSpecs() {
            specsModal.classList.toggle('visible');
        }

        function setView(view) {
            viewer.autoRotate = false;
            if (view === 'top') viewer.cameraOrbit = '0deg 0deg 2m';
            if (view === 'side') viewer.cameraOrbit = '90deg 90deg 2m';
            if (view === 'front') viewer.cameraOrbit = '0deg 90deg 2m';
        }
    </script>
</body>
</html>
